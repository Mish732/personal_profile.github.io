<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile — Personal Info Program</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ledger">

    <header class="ledger-head">
      <span class="tab">FILE NO. 001</span>
      <h1>Student Profile </h1>
      
    </header>

    <main class="sheet">

      <section class="entry-lines" id="profileCard">
        <p class="loading">Reading record… open the console (F12) to see the full printout.</p>
      </section>

      <section class="controls">
        <button id="btnSummary" class="stamp-btn">Show Summary (Alert)</button>
        <button id="btnConfirm" class="stamp-btn ghost">Confirm Enrollment</button>
        <button id="btnTable" class="stamp-btn ghost">Log console.table()</button>
      </section>

      <section class="calc-block" id="calcCard">
        <h2>Calculations</h2>
        <div class="calc-grid" id="calcGrid"></div>
      </section>

    </main>

    <footer class="ledger-foot">
      <span>Stamped &amp; generated by <code>script.js</code></span>
      <span id="stampDate"></span>
    </footer>
  </div>

<script src="script.js"></script>
</body>
</html>
